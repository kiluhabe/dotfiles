#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.5"
model_reasoning_effort = "high"
model_verbosity = "low"
personality = "pragmatic"

default_permissions = "personal-workspace"
approval_policy = "on-request"
project_doc_fallback_filenames = ["CLAUDE.md"]
project_doc_max_bytes = 65536

[tui]
status_line = ["model-with-reasoning", "context-remaining", "current-dir"]
terminal_title = ["spinner", "project"]

[tui.model_availability_nux]
"gpt-5.5" = 1

[plugins."superpowers@openai-curated"]
enabled = true

[permissions.personal-workspace]
description = "Workspace access with sensitive local and environment files denied."
extends = ":workspace"

[permissions.personal-workspace.filesystem]
glob_scan_max_depth = 3
"~/.ssh" = "deny"
"~/.aws" = "deny"
"~/.gnupg" = "deny"

[permissions.personal-workspace.filesystem.":workspace_roots"]
".env" = "deny"
".env.*" = "deny"
"**/.env" = "deny"
"**/.env.*" = "deny"

# Profile-scoped feature flags. This file is loaded via `codex --profile default`.
[features]
hooks = true
