name: Shellcheck
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  shellcheck:
    name: "Shellcheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run shellcheck
        run: shellcheck home/bin/* claude/.claude/hooks/*.sh agents/.agents/hooks/*.sh
