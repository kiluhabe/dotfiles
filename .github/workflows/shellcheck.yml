name: Shellcheck
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  shellcheck:
    name: "Shellcheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run shellcheck
        run: shellcheck home/bin/* claude/.claude/hooks/*.sh
