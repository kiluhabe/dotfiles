name: Shellcheck
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  shellcheck:
    name: "Shellcheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run shellcheck
        run: shellcheck home/bin/* claude/.claude/hooks/*.sh
