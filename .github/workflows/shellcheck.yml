name: Shellcheck
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  shellcheck:
    name: "Shellcheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run shellcheck
        run: |
          git grep -IlzE '^#!.*(sh|bash)' -- . | xargs -0r shellcheck
          shellcheck -s bash home/.bashrc
