name: Shellcheck
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  shellcheck:
    name: "Shellcheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Run shellcheck
        run: |
          git grep -IlzE '^#!.*(sh|bash)' -- . | xargs -0r shellcheck
          shellcheck -s bash home/.bashrc
