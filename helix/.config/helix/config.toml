# Helix config — Emacs 設定 (emacs/.emacs.d) からの移植。
# modal エディタと相性が悪い Emacs 側の VSCode 風 C-c キーバインドは持ち込まず、
# 対応する Helix ネイティブ操作を末尾コメントに記す(追加割り当ては最小限)。

theme = "dark_plus"  # Emacs の vscode-dark-plus に最も近い Helix 同梱テーマ

[editor]
# indent-tabs-mode nil / delete-trailing-whitespace / electric-pair-mode /
# global-tab-line-mode の移植。
bufferline = "multiple"          # バッファが複数のときだけタブを表示
auto-pairs = true                # electric-pair-mode
trim-trailing-whitespace = true  # before-save-hook delete-trailing-whitespace
trim-final-newlines = true
color-modes = true
cursorline = true
true-color = true

[editor.statusline]
# 20-modeline.el 相当: モード / ファイル名 / 読み取り専用 / 変更フラグ /
# 診断 / メジャーモード(file-type) / 位置(行:列)。
left = ["mode", "spinner", "file-name", "read-only-indicator", "file-modification-indicator"]
center = []
right = ["diagnostics", "file-type", "position"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[editor.file-picker]
# project-find-file 相当。ドットファイルも候補に出す。
hidden = false

# ── Emacs → Helix キーバインド対応(基本は標準準拠。追加は下の [keys] のみ) ──
# C-c p  project-find-file    -> Space f   (file picker)
# C-c P  M-x / command 一覧   -> Space ?   (command palette) または : (command mode)
# C-c F  project-find-regexp  -> Space /   (global search)
# C-c f  isearch-forward      -> /         (buffer search / n・N で移動)
# C-c z / C-c Z  undo/redo    -> u / U
# C-c c / C-c v  copy/paste   -> y / p(OS クリップボードは Space y / Space p)
# multiple-cursors 次/全      -> C(下)/ Alt-C(上)/ % で全選択→s で regex 分割
# M-r  recentf-open           -> Space ' (last_picker) / Space j (jumplist) /
#                                ga(最後に開いた file)/ gm(最後に変更した file)
# f8   dired サイドバー       -> Space e(下の [keys] で file_explorer を割り当て)

# file_explorer は 25.07 に存在するがデフォルト未割り当てなので、Emacs の
# f8 サイドバー相当として Space e に割り当てる(ワークスペース root のツリー)。
[keys.normal.space]
e = "file_explorer"
